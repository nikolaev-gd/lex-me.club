<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Пополнение баланса — Lex</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/site.css">
</head>
<body>

<header>
  <div class="wrap nav">
    <a class="brand" href="/ru/"><span class="dot"></span>Lex</a>
    <div class="nav-actions">
      <a href="/ru/account/" class="btn btn-ghost">Вернуться в аккаунт</a>
    </div>
  </div>
</header>

<main class="doc">
  <div class="wrap acct-wrap">
    <h1>Пополнение баланса</h1>

    <form id="checkout-form" class="acct-form" novalidate>
      <label for="co-amount">Сумма, USD</label>
      <input id="co-amount" type="number" min="10" max="200" step="1" value="10" inputmode="decimal" required>

      <label class="co-check">
        <input type="checkbox" id="co-terms">
        <span>Я прочитал и принимаю Условия и Правила возврата. <a href="/ru/terms/" target="_blank" rel="noopener">↗</a></span>
      </label>

      <label class="co-check">
        <input type="checkbox" id="co-now">
        <span>Прошу начать оказание услуги сразу и понимаю, что теряю право на отказ в течение 14 дней в части баланса, которую фактически израсходую.</span>
      </label>

      <p id="co-error" class="acct-error" hidden></p>
      <button id="co-submit" class="btn btn-primary btn-lg" type="submit">Заказ с обязательством оплаты</button>
    </form>

    <!-- SIBLING of #checkout-form, never nested inside it. HTML forbids nested
         forms: the parser drops the inner <form> start tag and lets its </form>
         close the OUTER form instead. That put #co-submit outside #checkout-form,
         so the submit handler bound in checkout.js never fired and the button was
         dead with no console error. Keep these two forms as siblings. -->
    <div id="co-signin" class="co-signin" hidden>
      <h2>Войдите, чтобы продолжить</h2>
      <p class="co-signin-note">Тот же аккаунт Lex, что и в расширении.</p>
      <form id="co-signin-form" novalidate>
        <label for="co-signin-email">Почта</label>
        <input id="co-signin-email" type="email" autocomplete="email" required>
        <label for="co-signin-password">Пароль</label>
        <input id="co-signin-password" type="password" autocomplete="current-password" required>
        <p id="co-signin-error" class="acct-error" hidden></p>
        <button id="co-signin-submit" class="btn btn-ghost" type="submit">Войти</button>
      </form>
    </div>
  </div>
</main>

<footer>
  <div class="wrap foot">
    <a class="brand" href="/ru/"><span class="dot"></span>Lex</a>
    <div class="foot-links"><a href="/ru/contact/">Контакты</a>
      <a href="/ru/privacy/">Конфиденциальность</a>
      <a href="/ru/terms/">Условия</a>
      <a href="/ru/refunds/">Возвраты</a></div>
    <div class="foot-copy">Lex — английский на тех видео, которые ты и так смотришь. © 2026</div>
  </div>
</footer>

<script>window.LEX_CHECKOUT_TEXT = {"err_amount": "Введите сумму от 10 до 200 USD.", "err_agree": "Отметьте оба пункта.", "err_auth": "Сначала войдите в аккаунт.", "no_provider": "Не удалось начать оплату. Деньги не списаны — попробуйте ещё раз.", "err_badlogin": "Неверная почта или пароль."};</script>
<script src="/assets/config.js"></script>
<!-- auth.js BEFORE checkout.js: checkout.js reads window.LexAuth for the session
     refresh and for the inline sign-in, and degrades silently without it. -->
<script src="/assets/auth.js"></script>
<script src="/assets/checkout.js"></script>
</body>
</html>
