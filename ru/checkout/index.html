<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Пополнение баланса — Lex</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/site.css">
</head>
<body>

<header>
  <div class="wrap nav">
    <a class="brand" href="/ru/"><span class="dot"></span>Lex</a>
    <div class="nav-actions">
      <a href="/ru/account/" class="btn btn-ghost">Вернуться в аккаунт</a>
    </div>
  </div>
</header>

<main class="doc">
  <div class="wrap acct-wrap">
    <h1>Пополнение баланса</h1>

    <form id="checkout-form" class="acct-form" novalidate>
      <label for="co-amount">Сумма, USD</label>
      <input id="co-amount" type="number" min="1" max="1000" step="1" value="10" inputmode="decimal" required>

      <label class="co-check">
        <input type="checkbox" id="co-terms">
        <span>Я прочитал и принимаю Условия и Правила возврата. <a href="/ru/terms/" target="_blank" rel="noopener">↗</a></span>
      </label>

      <label class="co-check">
        <input type="checkbox" id="co-now">
        <span>Прошу начать оказание услуги сразу и понимаю, что теряю право на отказ в течение 14 дней в части баланса, которую фактически израсходую.</span>
      </label>

      <p id="co-error" class="acct-error" hidden></p>
      <button id="co-submit" class="btn btn-primary btn-lg" type="submit">Заказ с обязательством оплаты</button>
    </form>
  </div>
</main>

<footer>
  <div class="wrap foot">
    <a class="brand" href="/ru/"><span class="dot"></span>Lex</a>
    <div class="foot-links"><a href="/ru/contact/">Контакты</a>
      <a href="/ru/privacy/">Конфиденциальность</a>
      <a href="/ru/terms/">Условия</a>
      <a href="/ru/refunds/">Возвраты</a></div>
    <div class="foot-copy">Lex — английский на тех видео, которые ты и так смотришь. © 2026</div>
  </div>
</footer>

<script>window.LEX_CHECKOUT_TEXT = {"err_amount": "Введите сумму от 1 до 1000 USD.", "err_agree": "Отметьте оба пункта.", "err_auth": "Сначала войдите в аккаунт.", "no_provider": "Оплата картой пока не подключена. Заказ сохранён, деньги не списаны."};</script>
<script src="/assets/config.js"></script>
<script src="/assets/checkout.js"></script>
</body>
</html>
